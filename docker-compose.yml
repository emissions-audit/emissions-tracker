services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: emissions
      POSTGRES_PASSWORD: emissions
      POSTGRES_DB: emissions
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://emissions:emissions@db:5432/emissions
    depends_on:
      - db

  pipeline:
    build:
      context: .
      dockerfile: Dockerfile.pipeline
    environment:
      DATABASE_URL: postgresql+asyncpg://emissions:emissions@db:5432/emissions
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      - db
    profiles:
      - pipeline

volumes:
  pgdata:
