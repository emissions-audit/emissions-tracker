name: Data Ingestion Pipeline

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      sources:
        description: 'Sources to ingest (comma-separated, or "all")'
        default: 'all'
        type: string

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      DATABASE_URL: ${{ secrets.RAILWAY_DATABASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install .

      - name: Run migrations
        run: alembic upgrade head

      - name: Seed companies
        run: emissions-pipeline seed

      - name: Ingest data
        run: |
          SOURCES="${{ github.event.inputs.sources || 'all' }}"
          if [ "$SOURCES" = "all" ]; then
            SOURCES="edgar,climate_trace,cdp,carb,epa_ghgrp,eu_ets"
          fi
          IFS=',' read -ra SOURCE_LIST <<< "$SOURCES"
          for src in "${SOURCE_LIST[@]}"; do
            echo "::group::Ingesting $src"
            emissions-pipeline ingest "$src" || echo "::warning::$src ingestion failed"
            echo "::endgroup::"
          done

      - name: Run cross-validation
        run: emissions-pipeline validate

      - name: Coverage report
        run: emissions-pipeline coverage
